<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0C0C0F"/>

  <!-- Outer frame - top bar -->
  <rect x="4" y="4" width="24" height="2.5" rx="1" fill="#A8E63D"/>
  <!-- Left vertical -->
  <rect x="4" y="4" width="2" height="20" rx="1" fill="#A8E63D"/>
  <!-- Right vertical -->
  <rect x="26" y="4" width="2" height="20" rx="1" fill="#A8E63D"/>
  <!-- Bottom base -->
  <rect x="3" y="23" width="26" height="3" rx="1.5" fill="#A8E63D"/>

  <!-- Nozzle arm (horizontal) -->
  <rect x="12" y="6.5" width="8" height="1.8" rx="0.9" fill="#A8E63D"/>
  <!-- Nozzle body -->
  <rect x="14.5" y="8" width="3" height="3" rx="0.5" fill="#A8E63D"/>
  <!-- Nozzle tip -->
  <polygon points="14.5,11 17.5,11 16.8,13 15.2,13" fill="#A8E63D"/>

  <!-- Isometric cube being printed -->
  <!-- Top face -->
  <polygon points="16,14.5 20,16.5 16,18.5 12,16.5" fill="none" stroke="#A8E63D" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Left face -->
  <polygon points="12,16.5 16,18.5 16,21.5 12,19.5" fill="none" stroke="#A8E63D" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Right face -->
  <polygon points="20,16.5 16,18.5 16,21.5 20,19.5" fill="none" stroke="#A8E63D" stroke-width="1.2" stroke-linejoin="round"/>
</svg>
